name: Publish Packages

on:
  push:
    tags:
      - '**/v[0-9]*'   # matches ai/v1.0.2, domain-errors/v1.0.1, etc.
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to publish (e.g. ai, domain-errors)'
        required: true
        type: string
      version:
        description: 'Version tag (e.g. v1.0.2)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tkhtechinc'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Resolve package name
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "package=${{ inputs.package }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "package=${TAG%%/v*}" >> $GITHUB_OUTPUT
          fi

      - name: Publish changed package
        run: |
          PACKAGE="${{ steps.resolve.outputs.package }}"
          cd packages/$PACKAGE
          npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
